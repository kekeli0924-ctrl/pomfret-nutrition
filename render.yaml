services:
  - type: web
    name: pomfret-nutrition
    runtime: node
    plan: free
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: USDA_API_KEY
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
